<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniMax Token-Plan Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <h1>MiniMax Dashboard</h1>
        <span class="subtitle">Token-Plan Monitor</span>
      </div>
      <div class="header-actions">
        <button id="addAccountBtn" class="btn-primary">+ Add Account</button>
        <button id="refreshBtn" class="btn-secondary">Refresh</button>
      </div>
    </header>

    <div id="accountsGrid" class="accounts-grid"></div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📊</div>
      <p>No accounts configured</p>
      <p class="hint">Click "Add Account" to add your first MiniMax account</p>
    </div>

    <div id="lastUpdate" class="last-update"></div>
  </div>

  <!-- Add Account Modal -->
  <div id="addModal" class="modal hidden">
    <div class="modal-content">
      <h2>Add New Account</h2>
      <form id="addAccountForm">
        <div class="form-group">
          <label for="accountName">Account Name</label>
          <input type="text" id="accountName" required placeholder="My MiniMax Account">
        </div>
        <div class="form-group">
          <label for="accountToken">API Token</label>
          <input type="password" id="accountToken" required placeholder="Your MiniMax API Token">
        </div>
        <div class="form-group">
          <label for="accountGroupId">Group ID <span class="optional">(optional)</span></label>
          <input type="text" id="accountGroupId" placeholder="Group ID">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Add</button>
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
