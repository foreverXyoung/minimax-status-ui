<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniMax Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <h1 data-i18n="title">MiniMax Dashboard</h1>
        <span class="subtitle" data-i18n="subtitle">Token-Plan Monitor</span>
      </div>
      <div class="header-actions">
        <select id="themeSelect" class="refresh-select">
          <option value="gradient">🌈 渐变</option>
          <option value="light">☀️ 浅色</option>
          <option value="dark">🌙 深色</option>
          <option value="system">💻 跟随系统</option>
        </select>
        <select id="refreshIntervalSelect" class="refresh-select">
          <option value="0" data-i18n="manual">手动</option>
          <option value="10">10s</option>
          <option value="30" selected>30s</option>
          <option value="60">1min</option>
          <option value="300">5min</option>
          <option value="600">10min</option>
        </select>
        <select id="languageSelect" class="refresh-select">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
          <option value="en">English</option>
        </select>
        <button id="addAccountBtn" class="btn-primary" data-i18n="addAccount">+ 添加账号</button>
        <button id="refreshBtn" class="btn-secondary" data-i18n="refresh">刷新</button>
      </div>
    </header>

    <div id="accountsGrid" class="accounts-grid"></div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📊</div>
      <p data-i18n="noAccounts">暂无配置账号</p>
      <p class="hint" data-i18n="noAccountsHint">点击"添加账号"添加您的第一个 MiniMax 账号</p>
    </div>

    <div id="lastUpdate" class="last-update"></div>
  </div>

  <!-- Add Account Modal -->
  <div id="addModal" class="modal hidden">
    <div class="modal-content">
      <h2 data-i18n="addNewAccount">添加新账号</h2>
      <form id="addAccountForm">
        <div class="form-group">
          <label for="accountName" data-i18n="accountName">账号名称</label>
          <input type="text" id="accountName" required placeholder="My Account">
        </div>
        <div class="form-group">
          <label for="accountToken" data-i18n="apiToken">API Token</label>
          <input type="password" id="accountToken" required placeholder="Your API Token">
        </div>
        <div class="form-group">
          <label for="accountGroupId" data-i18n="groupId">Group ID <span class="optional">(optional)</span></label>
          <input type="text" id="accountGroupId" placeholder="Group ID">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" data-i18n="add">添加</button>
          <button type="button" class="btn-secondary" onclick="closeModal()" data-i18n="cancel">取消</button>
        </div>
      </form>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
